<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .admin-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body class="p-4">
<div class="container">
    <div class="admin-card">

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4">
            <h2 class="m-0">Admin Panel</h2>
            <form action="{{ url_for('admin_logout') }}" method="POST">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
            </form>
        </div>

        <form method="GET" action="{{ url_for('admin') }}" class="row g-2 align-items-center mb-4">
            <div class="col-12 col-md-3">
                <label for="subject" class="form-label mb-0 fw-semibold">Select Subject</label>
            </div>
            <div class="col-12 col-md-6">
                <select class="form-select" id="subject" name="subject" onchange="this.form.submit()">
                    {% for subject in subjects %}
                    <option value="{{ subject.key }}" {% if subject.key == selected_subject_key %}selected{% endif %}>
                        {{ subject.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12 col-md-3 text-md-end">
                <span class="badge text-bg-dark">{{ groups|length }} Groups</span>
            </div>
        </form>

        <div class="text-center mb-4">
            <a href="{{ url_for('download_excel', subject=selected_subject_key) }}" class="btn btn-success me-2 mb-2">
                Download Excel
            </a>

            <a href="{{ url_for('download_pdf', subject=selected_subject_key) }}" class="btn btn-danger mb-2">
                Download PDF
            </a>
        </div>

        <hr>

        <h4 class="mb-3">Registered Groups - {{ selected_subject.name }}</h4>

        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th style="width:10%">#</th>
                        <th style="width:55%">Topic</th>
                        <th style="width:35%">Action</th>
                    </tr>
                </thead>
                <tbody>
                {% for g in groups %}
                    <tr>
                        <td>{{ g.id }}</td>
                        <td>{{ g.topic }}</td>
                        <td>
                            <a href="{{ url_for('edit_group', group_id=g.id) }}" class="btn btn-primary btn-sm me-2 mb-1">
                                Edit
                            </a>

                            <form action="{{ url_for('delete_group', group_id=g.id) }}"
                                  method="POST"
                                  style="display:inline;"
                                  onsubmit="return confirm('Are you sure you want to delete this group?');">
                                <input type="hidden" name="subject" value="{{ selected_subject_key }}">
                                <button type="submit" class="btn btn-danger btn-sm mb-1">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                {% else %}
                    <tr>
                        <td colspan="3" class="text-center">No groups registered for this subject.</td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</div>
</body>
</html>
